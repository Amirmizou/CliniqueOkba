<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Medical Scanner Navbar</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Initialize Scanner Protocol...</div>
    
    <!-- 2D UI Overlay for the selected navigation item -->
    <div id="ui-overlay">
        <h1 id="brand">CLINIQUE OKBA</h1>
        <div id="status"><span class="led"></span> SYSTEM ONLINE</div>
        <div id="nav-target">Awaiting Selection...</div>
    </div>

    <!-- The 3D Canvas will be injected here by Three.js -->
    <script type="module" src="main.js"></script>
</body>
</html>
